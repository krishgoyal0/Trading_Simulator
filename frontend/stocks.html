<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeFlow | Market</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="CSS/stocks.css">
</head>
<body>
  <div class="market-container">
    <header class="market-header">
      <div>
        <h1>Live Market</h1>
        <p>Real-time stock prices with virtual trading</p>
      </div>

      <div class="header-actions">
        <button id="dashboardBtn" class="secondary-btn">
          <i class="fas fa-home"></i>
          Dashboard
        </button>

        <div class="update-info">
          <div class="update-box">
            <span class="update-label">Last Updated</span>
            <span id="lastUpdatedTime" class="update-value">--:--:--</span>
          </div>

          <div class="update-box">
            <span class="update-label">Next Update In</span>
            <span id="countdownTimer" class="update-value">00:30</span>
          </div>
        </div>
      </div>
    </header>

    <section class="toolbar">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input
          type="text"
          id="searchInput"
          placeholder="Search by symbol or company name"
        >
      </div>

      <div class="market-status">
        <span class="status-dot"></span>
        Live Market Data
      </div>
    </section>

    <section class="table-section">
      <table class="stocks-table">
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Company</th>
            <th>Price</th>
            <th>Buy</th>
            <th>Sell</th>
          </tr>
        </thead>
        <tbody id="stocksTableBody">
          <tr>
            <td colspan="5" class="loading-cell">Loading market data...</td>
          </tr>
        </tbody>
      </table>
    </section>
  </div>

  <div id="tradeModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Buy Stock</h2>
        <button id="closeModalBtn" class="close-btn">&times;</button>
      </div>

      <div class="modal-body">
        <div class="stock-info">
          <div>
            <span class="label">Stock</span>
            <strong id="modalSymbol">-</strong>
          </div>

          <div>
            <span class="label">Current Price</span>
            <strong id="modalPrice">₹0.00</strong>
          </div>
        </div>

        <div class="input-group">
          <label for="quantityInput">Quantity</label>
          <input
            type="number"
            id="quantityInput"
            min="1"
            value="1"
          >
        </div>

        <div class="trade-summary">
          <span>Total Cost</span>
          <strong id="totalAmount">₹0.00</strong>
        </div>

        <div id="tradeMessage" class="trade-message"></div>

        <button id="confirmTradeBtn" class="primary-btn full-width">
          Confirm Buy
        </button>
      </div>
    </div>
  </div>

  <script src="JS/stocks.js"></script>
</body>
</html>
