<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeFlow | Fund Wallet</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="CSS/wallet.css">
</head>
<body>
  <div class="wallet-container">
    <div class="wallet-card">
      <div class="logo-area">
        <h1>
          <i class="fas fa-wallet logo-icon"></i>
          TradeFlow
        </h1>
        <p>Fund your virtual wallet to start trading</p>
      </div>

      <div class="balance-section">
        <p class="balance-label">Current Balance</p>
        <h2 id="currentBalance">₹0.00</h2>
      </div>

      <div class="quick-amounts">
        <p class="section-title">Quick Add</p>

        <div class="amount-grid">
          <button class="amount-btn" data-amount="10000">₹10,000</button>
          <button class="amount-btn" data-amount="50000">₹50,000</button>
          <button class="amount-btn active" data-amount="100000">₹100,000</button>
          <button class="amount-btn" data-amount="500000">₹500,000</button>
        </div>
      </div>

      <div class="custom-amount">
        <label for="amountInput">Or Enter Custom Amount</label>
        <div class="input-wrapper">
          <span>₹</span>
          <input
            type="number"
            id="amountInput"
            min="1"
            step="1"
            value="100000"
            placeholder="Enter amount"
          >
        </div>
      </div>

      <div id="message" class="message"></div>

      <button id="addFundsBtn" class="btn-primary">
        <i class="fas fa-plus-circle"></i>
        Add Funds
      </button>

      <button id="continueBtn" class="btn-secondary" disabled>
        <i class="fas fa-arrow-right"></i>
        Continue to Dashboard
      </button>

      <div class="note-box">
        <i class="fas fa-coins"></i>
        This is simulated money for learning and practice.
      </div>
    </div>
  </div>

  <script src="JS/wallet.js"></script>
</body>
</html>
