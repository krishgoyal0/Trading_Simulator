<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>TradeFlow | Modern Trading Simulator</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div class="auth-container">
  <div class="glass-card">
    <div class="logo-area">
      <h1>
        <i class="fas fa-chart-line"
           style="background: none; -webkit-background-clip: unset; color: #3b82f6;"></i>
        TradeFlow
      </h1>
      <p>Simulate • Learn • Master the markets</p>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" id="tabLoginBtn">🔐 Sign In</button>
      <button class="tab-btn" id="tabRegisterBtn">✨ Create Account</button>
    </div>

    <div id="loginFormContainer">
      <form id="loginForm" class="auth-form">
        <div class="input-group">
          <label><i class="far fa-envelope"></i> Email</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="email"
                   id="loginEmail"
                   placeholder="trader@example.com"
                   autocomplete="email">
          </div>
        </div>

        <div class="input-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <div class="input-wrapper">
            <i class="fas fa-key"></i>
            <input type="password"
                   id="loginPassword"
                   placeholder="••••••••">
          </div>
          <div id="loginError" class="error-msg"></div>
        </div>

        <button type="submit" class="btn-primary">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>

        <div class="demo-note">
          <i class="fas fa-flask"></i>
          Demo mode: any email & password works (simulated) — backend ready for real integration.
        </div>
      </form>
    </div>

    <div id="registerFormContainer" style="display: none;">
      <form id="registerForm" class="auth-form">
        <div class="input-group">
          <label><i class="fas fa-user-circle"></i> Full name</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="regName" placeholder="Alex Johnson">
          </div>
        </div>

        <div class="input-group">
          <label><i class="far fa-envelope"></i> Email address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="regEmail" placeholder="hello@trader.com">
          </div>
        </div>

        <div class="input-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <div class="input-wrapper">
            <i class="fas fa-key"></i>
            <input type="password"
                   id="regPassword"
                   placeholder="Create strong password">
          </div>
          <div id="regError" class="error-msg"></div>
        </div>

        <button type="submit" class="btn-primary">
          <i class="fas fa-user-plus"></i> Register & Start
        </button>

        <div class="demo-note">
          <i class="fas fa-database"></i>
          Backend ready → after signup you'll be redirected to Dashboard.
        </div>
      </form>
    </div>
  </div>
</div>

<script src="JS/login.js"></script>
</body>
</html>
